apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: es-statefulset
  name: es-statefulset
spec:
  replicas: 2
  selector:
    matchLabels:
      app: es-statefulset
  serviceName: es-node-discovery-service
  template:
    metadata:
      labels:
        app: es-statefulset
    spec:
      containers:
        - image: elasticsearch:9.3.2
          name: elasticsearch
          resources: 
            limits:
              memory: 2Gi
          volumeMounts:
            - name: es-volume
              mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
              subPath: elasticsearch.yml
            - name: es-persistent-volume-claim
              mountPath: /usr/share/elasticsearch/data
          startupProbe:
            failureThreshold: 12
            periodSeconds: 10 
            tcpSocket:
              port: 9200
      initContainers:
        - image: busybox:stable
          name: es-init-container
          command:
            - /bin/sh
          args:
            - '-c'	
            - 'chmod 757 /usr/share/elasticsearch/data && chown 1000:1000 /usr/share/elasticsearch/data'
          volumeMounts:
            - name: es-persistent-volume-claim
              mountPath: /usr/share/elasticsearch/data
          securityContext:
            privileged: true
      volumes:
        - name: es-volume
          configMap:
            name: es-configmap
  volumeClaimTemplates:
    - metadata:
        name: es-persistent-volume-claim
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        storageClassName: es-persistent-volume
status: {}
