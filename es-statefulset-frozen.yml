apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: es-statefulset-frozen
  name: es-statefulset-frozen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: es-statefulset-frozen
  serviceName: es-headless-service-frozen-node-discovery
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        app: es-statefulset-frozen
        part-of: es-statefulset
    spec:
      containers:
        - image: elasticsearch:9.3.2
          name: elasticsearch
          resources: 
            limits:
              memory: 2Gi
          volumeMounts:
            - name: es-volume
              mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
              subPath: elasticsearch.yml
            - name: es-persistent-volume-claim
              mountPath: /usr/share/elasticsearch/data
          startupProbe:
            failureThreshold: 6
            periodSeconds: 10 
            tcpSocket:
              port: 9200
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /_cluster/health
              port: 9200
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
          env:
            - name: NODE_ROLE
              value: data_frozen
      volumes:
        - name: es-volume
          configMap:
            name: es-configmap
  volumeClaimTemplates:
    - metadata:
        name: es-persistent-volume-claim
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        storageClassName: standard
status: {}
